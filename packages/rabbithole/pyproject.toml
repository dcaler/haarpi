[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rabbithole"
version = "0.1.0"
description = "RAbbithole: offline-first Research Assistant for literature reviews and annotated bibliographies, driven by local LLMs."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
authors = [{ name = "dcaler" }]
keywords = ["literature-review", "research", "llm", "ollama", "rag", "zotero", "annotated-bibliography"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Topic :: Text Processing :: General",
]
dependencies = [
    "haarpi",
    "httpx>=0.27",
    "PyYAML>=6.0.2",
    "PyMuPDF>=1.24",
    "python-docx>=1.1",
]

[project.urls]
Homepage = "https://github.com/dcaler/haarpi"
Repository = "https://github.com/dcaler/haarpi"

[project.optional-dependencies]
claude = ["anthropic>=0.39"]
rag = ["chromadb>=0.5"]

[project.scripts]
rabbitHole = "rabbithole.cli:main"

[tool.setuptools.packages.find]
include = ["rabbithole*"]

[tool.uv.sources]
haarpi = { workspace = true }
